<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ask Me Anything — NexusAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/common.css" />
    <link rel="stylesheet" href="../styles/ask.css" />
  </head>
  <body>
    <nav>
      <a href="../index.html" class="nav-logo">
        <div class="logo-dot"></div>Nexus<span>AI</span>
      </a>
      <div class="nav-right">
        <div class="nav-tools">
                     <a href="../index.html" class="tool-pill">Home</a>
          <a href="ask.html" class="tool-pill active">Ask</a>
          <a href="summarizer.html" class="tool-pill">Summarize</a>
          <a href="idea-spark.html" class="tool-pill">Ideas</a>
          <a href="definition.html" class="tool-pill">Define</a>
        </div>
        <a href="../index.html" class="nav-back">← Back to Studio</a>
      </div>
    </nav>

    <main>
      <div class="tool-hero">
        <div class="tool-icon-wrap">💬</div>
        <div class="tool-eyebrow">Tool 01</div>
        <h1 class="tool-title">Ask Me <em>Anything</em></h1>
        <p class="tool-desc">Have a question? Type it below and receive an intelligent, thoughtful answer on virtually any topic.</p>
      </div>

      <div class="input-container">
        <label class="input-label">Your Question</label>
        <textarea
          class="question-input"
          id="questionInput"
          placeholder="What would you like to know? Ask anything…"
          rows="3"
          oninput="updateCount()"
        ></textarea>
        <div class="input-footer">
          <div class="suggestions">
            <button class="suggest-btn" onclick="setSuggestion('How does quantum computing work?')">Quantum computing?</button>
            <button class="suggest-btn" onclick="setSuggestion('What is the meaning of life?')">Meaning of life?</button>
            <button class="suggest-btn" onclick="setSuggestion('Explain black holes simply')">Black holes?</button>
            <button class="suggest-btn" onclick="setSuggestion('Why is the sky blue?')">Sky is blue?</button>
          </div>
          <span class="char-count" id="charCount">0 / 500</span>
        </div>
      </div>

      <button class="ask-btn" id="askBtn" onclick="askQuestion()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        Get Answer
      </button>

      <div class="response-area" id="responseArea"></div>

      <div class="history-section" id="historySection" style="display: none">
        <div class="history-title">Recent Questions</div>
        <div id="historyList"></div>
      </div>
    </main>

    <footer>
      <div class="footer-copy">© 2025 <span>NexusAI</span> Studio</div>
      <div class="footer-links">
        <a href="../index.html">Home</a>
        <a href="#" onclick="return false">Privacy</a>
        <a href="#" onclick="return false">Terms</a>
      </div>
    </footer>

    <script src="../scripts/ask.js"></script>
  </body>
</html>
